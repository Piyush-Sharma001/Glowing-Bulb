<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Bulb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        img {
            height: 400px;
        }

        button {
            letter-spacing: 2px;
            background-color: rgb(0, 0, 0);
            color: white;
            margin: 15px 5px;
            height: 43px;
            width: 122px;
            padding: 14px 11px;
            border-radius: 17px;
            transition: background-color 0.3s, transform 0.3s;
        }

        button:hover {
            cursor: pointer;
            transform: scaleY(3deg);
            color: black;
            background-color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1> Bulb-Off / On Project</h1>
        <div id="bulb">
            <img loading="lazy"       class="off" src="/Mini Projects/Glowing Bulb/off.jpg" alt="Bulb-Off">
        </div>
        <div id="buttons">
            <button type="button" onclick="bulboff()">Off</button>
            <button type="button" onclick="bulbon()">On</button>
            <center><button type="button" onclick="dipper()">On | Off</button></center>
        </div>
    </div>
    <script>
        // Bulb off Function
        function bulboff() {
            let imagetag = document.querySelector(".off");
            imagetag.setAttribute("src", "/Mini Projects/Glowing Bulb/off.jpg");
            // document.body.style.backgroundColor = "Black";


        }
        // Bulb on Function
        function bulbon() {
            let imagetag = document.querySelector(".off");
            imagetag.setAttribute("src", "/Mini Projects/Glowing Bulb/on.jpg");
            // document.body.style.backgroundColor = "white";
            // let bg = document.getElementsByClassName("off")[0]
            // bg.style.backgroundColor = "white";
        }
        let intervalId;
        let isOn = false;

        function dipper() {
            let imagetag = document.querySelector(".off");

            // If interval is already running, clear it to stop blinking
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
                return;
            }

            intervalId = setInterval(() => {
                if (isOn) {
                    imagetag.setAttribute("src", "/Mini Projects/Glowing Bulb/off.jpg");
                } else {
                    imagetag.setAttribute("src", "/Mini Projects/Glowing Bulb/on.jpg");
                }
                isOn = !isOn;
            },500);
        }
    </script>
</body>
</html>
